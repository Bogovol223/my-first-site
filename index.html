<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій сайт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>hello world</h1>
    <p>Це мій перший сайт, створений у VS Code.</p>
    
    <img src="foto.jpn.png" alt="картинка" width="300">
    
    <div id="commentsSection">
        <button id="myBtn">Тикай!</button>
        <hr>
        <h3>Залишити коментар:</h3>
        <input type="text" id="userInput" placeholder="Напишіть щось...">
        <button id="sendBtn">Надіслати</button>
    </div>

    <script>
        const button = document.getElementById('myBtn');
        button.addEventListener('click', () => {
            document.body.style.backgroundColor = '#d1c4e9';
        });

        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const section = document.getElementById('commentsSection');

        sendBtn.addEventListener('click', () => {
            const text = input.value;
            const newComment = document.createElement('p');
            newComment.textContent = `Користувач сказав: ${text}`;
            section.appendChild(newComment);
            input.value = '';
        });
    </script>
</body>
</html>
