<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій Кібер-сайт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>hello world</h1>
    <p>Це мій перший сайт із хмарною базою даних!</p>
    
    <img src="my-photo.png.png" alt="картинка" width="300">
    
    <div id="commentsSection">
        <button id="myBtn">Тикай!</button>
        <hr>
        <h3>Поділись анонімно думками:</h3>
        <input type="text" id="userInput" placeholder="Напишіть щось...">
        <button id="sendBtn">Надіслати в хмару</button>
        <div id="displayComments"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://cyber-app-d1e13-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "cyber-app-d1e13",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const commentsRef = ref(db, 'comments');

        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const display = document.getElementById('displayComments');
        const button = document.getElementById('myBtn');

        // 1. Перемикач кольору фону
        button.addEventListener('click', () => {
            if (document.body.style.backgroundColor === 'rgb(209, 196, 233)') {
                document.body.style.backgroundColor = '#eef2f3';
            } else {
                document.body.style.backgroundColor = 'rgb(209, 196, 233)';
            }
        });

        // 2. Логіка надсилання анонімних повідомлень
        sendBtn.addEventListener('click', () => {
            const text = input.value.trim();
            if (text !== "") {
                // Генерація випадкового ID аноніма (наприклад, Anon#4a1b)
                const anonId = "Anon#" + Math.random().toString(16).slice(2, 6);
                
                push(commentsRef, { 
                    message: text,
                    author: anonId,
                    timestamp: new Date().toLocaleTimeString()
                });
                input.value = '';
            }
        });

        // 3. Логіка отримання та відображення коментарів
        onChildAdded(commentsRef, (data) => {
            const comment = data.val();
            const p = document.createElement('p');
            
            // Стилізація окремого повідомлення
            p.style.borderBottom = "1px solid #ddd";
            p.style.padding = "10px";
            p.style.textAlign = "left";
            
            // Використовуємо innerHTML для структури, але message беремо як текст для безпеки
            const safeMessage = document.createElement('span');
            safeMessage.textContent = comment.message;

            p.innerHTML = `<strong style="color: #6200ee;">${comment.author || 'Анонім'}:</strong> `;
            p.appendChild(safeMessage);
            p.innerHTML += `<br> <small style="color: gray;">${comment.timestamp || ''}</small>`;
            
            // Додаємо нове повідомлення вгору списку
            display.prepend(p);
        });
    </script>
</body>
</html>
